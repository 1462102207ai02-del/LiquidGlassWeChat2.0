name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ 安装基础环境（稳定版）
    - name: Install Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential clang git wget xz-utils

    # ✅ 安装 Theos
    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos

    # ✅ 安装 iOS SDK（关键）
    - name: Install SDK
      run: |
        mkdir -p $HOME/theos/sdks
        cd $HOME/theos/sdks
        wget https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
        tar -xf iPhoneOS16.5.sdk.tar.xz

    # ✅ 编译
    - name: Build Package
      run: |
        export THEOS=$HOME/theos
        make clean package FINALPACKAGE=1

    # ✅ 上传 deb
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: deb
        path: packages/*.deb
